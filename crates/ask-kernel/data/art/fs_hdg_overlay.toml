void = "#000000"
shadow = "#2a2a2a"
stone_dark = "#6e6e6e"
floor = "#9aa3ad"
stone_light = "#c5cdd6"
granite = "#a8b0b8"
crystal = "#9ad0ff"

# Nature / fluids
plant = "#3dcc5a"
organic = "#7a9a45"
earth = "#a67c52"
wood = "#c4a574"
aquifer = "#2f7bff"
water = "#3d9eff"
water_deep = "#1a4fff"

# Heat / value / magic
magma = "#ff4500"
fire = "#ff8c1a"
blood = "#e03535"
gold = "#ffd000"
magic = "#c44cff"

# UI / entities
ui_primary = "#00ff66"
ui_warning = "#ffcc00"
