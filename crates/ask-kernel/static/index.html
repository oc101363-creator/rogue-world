<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASK</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="https://cdn.jsdelivr.net/npm/rot-js@2.2.1/dist/rot.js"></script>
  </head>
  <body>
    <div id="viewport">
      <div id="map"></div>
    </div>
    <div id="hud">
      <span id="status">…</span>
      <span id="info"></span>
      <span id="cam"></span>
    </div>
    <div id="theme-bar">
      <label for="theme">主题</label>
      <select id="theme" aria-label="Map color theme"></select>
    </div>
    <div id="help">
      滚轮缩放 · 拖拽平移 · 空格跟随Agent · R重置 · +/-缩放 · 右上角切换主题
    </div>
    <script src="/static/themes.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
